<!-- ============================================================
     i am — clay and kelsy · live lyric video
     Paste this whole block into a WordPress "Custom HTML" block.
     (Replaces any previous version of the block — one block, no
     plugins, no PHP.)

     WHY THE <style> LINE: iOS Safari paints its status-bar area and
     the surround of its bottom toolbar with the TOP page's html/body
     background color. The theme's background is white → white strips
     around the show on mobile. Painting the parent page black turns
     both dark. (A <meta theme-color> can't be added reliably from a
     block — iOS only reads it from <head> at load — so page
     background IS the lever available to a Custom HTML block.)
     The style is inside this block, so it only affects this page.
     ============================================================ -->
<style>
  html, body { background: #000 !important; }
</style>
<div id="iam-embed" style="position:relative;width:100vw;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;height:100svh;height:100dvh;background:#000;overflow:hidden;">
  <iframe
    src="https://clayburton.github.io/i-am-live/"
    title="i am — clay and kelsy"
    loading="lazy"
    allow="fullscreen; autoplay"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;">
  </iframe>
</div>
