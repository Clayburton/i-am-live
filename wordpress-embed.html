<!-- ============================================================
     i am — clay and kelsy · live lyric video
     Paste this whole block into a WordPress "Custom HTML" block.
     It full-bleeds an immersive frame that loads the live page,
     and tints iOS Safari's status bar + toolbar black so the show
     isn't framed by white bars (as fullscreen as the web allows).
     ============================================================ -->
<div id="iam-embed" style="position:relative;width:100vw;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;height:100svh;height:100dvh;background:#000;overflow:hidden;">
  <iframe
    src="https://clayburton.github.io/i-am-live/"
    title="i am — clay and kelsy"
    loading="lazy"
    allow="fullscreen; autoplay"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;">
  </iframe>
</div>
<script>
(function () {
  // iOS Safari colors the status bar + bottom toolbar from the TOP page's
  // theme-color. This block runs on the WordPress page (not the iframe), so
  // setting it here is what turns those white bars black on mobile.
  var m = document.querySelector('meta[name="theme-color"]');
  if (!m) { m = document.createElement('meta'); m.setAttribute('name', 'theme-color'); document.head.appendChild(m); }
  m.setAttribute('content', '#000000');
  // Nudge the page a hair taller than the viewport so a single upward swipe
  // lets Safari minimize its bottom toolbar (it can't be removed outright).
  try { document.documentElement.style.minHeight = 'calc(100dvh + 2px)'; } catch (e) {}
}());
</script>
